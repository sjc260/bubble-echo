<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Echo — Che emozione hai sentito?</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css?v=2">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f5f4ef;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 2rem;
}

.scene {
  position: relative;
  width: 380px;
  height: 760px;
  background: linear-gradient(180deg, #fbfaf6 0%, #f3f1ea 50%, #ebe7dc 100%);
  border-radius: 50px;
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,0.12), 0 0 0 12px #1a1a1a, 0 0 0 14px #2a2a2a;
}

.notch {
  position: absolute;
  top: 12px; left: 50%;
  transform: translateX(-50%);
  width: 110px; height: 28px;
  background: #1a1a1a;
  border-radius: 20px;
  z-index: 100;
}
.status-bar {
  position: absolute;
  top: 18px; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  padding: 0 32px;
  font-size: 14px;
  font-weight: 600;
  color: #1a1a1a;
  z-index: 99;
}

.back-btn {
  position: absolute;
  top: 60px; left: 24px;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: #555;
  cursor: pointer;
  border: 1px solid rgba(0,0,0,0.04);
  z-index: 50;
  transition: all 0.2s;
}
.back-btn:hover { background: #fff; }

.step-indicator {
  position: absolute;
  top: 64px; right: 24px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(8px);
  padding: 7px 14px;
  border-radius: 20px;
  z-index: 50;
  border: 1px solid rgba(0,0,0,0.04);
  font-size: 11px;
  color: #444;
  font-weight: 500;
  letter-spacing: 0.3px;
}
.step-dots { display: flex; gap: 4px; }
.step-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(0,0,0,0.15);
}
.step-dot.active { background: #1a1a1a; }

.ai-prompt {
  position: absolute;
  top: 122px; left: 0; right: 0;
  padding: 0 36px;
  text-align: center;
  z-index: 10;
}
.ai-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: #8a8474;
  margin-bottom: 12px;
  background: rgba(255,255,255,0.55);
  padding: 5px 12px;
  border-radius: 12px;
  backdrop-filter: blur(6px);
}
.ai-text {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 22px;
  font-style: italic;
  color: #1a1a1a;
  line-height: 1.4;
  letter-spacing: -0.3px;
}
.ai-subtext {
  font-size: 11px;
  color: #a09886;
  margin-top: 8px;
  font-style: italic;
  letter-spacing: 0.2px;
}

.constellation {
  position: absolute;
  top: 230px; bottom: 90px;
  left: 0; right: 0;
  z-index: 5;
}

@keyframes drift1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(8px,-10px); } }
@keyframes drift2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-9px,-7px); } }
@keyframes drift3 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(7px,9px); } }
@keyframes drift4 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-7px,8px); } }
@keyframes drift5 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(10px,-6px); } }
@keyframes drift6 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-8px,-9px); } }
@keyframes drift7 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(6px,11px); } }

.emo-bubble {
  position: absolute;
  border-radius: 50%;
  cursor: pointer;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 10px 8px;
}
.emo-bubble::before {
  content: '';
  position: absolute;
  top: 12%; left: 18%;
  width: 32%; height: 24%;
  background: rgba(255,255,255,0.85);
  border-radius: 50%;
  filter: blur(3px);
  pointer-events: none;
}
.emo-bubble::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 70% 78%, rgba(0,0,0,0.04), transparent 55%);
  pointer-events: none;
}

.emo-cluster {
  position: relative;
  z-index: 2;
  font-family: Georgia, serif;
  line-height: 1.3;
  letter-spacing: 0.1px;
  text-shadow: 0 1px 2px rgba(255,255,255,0.7);
  padding: 0 4px;
}
.emo-cluster .main {
  font-size: 14px;
  font-weight: 500;
  color: #1a1a1a;
  display: block;
  margin-bottom: 3px;
  font-style: italic;
}
.emo-cluster .secondary {
  font-size: 9px;
  color: #6b6555;
  font-style: italic;
  display: block;
}

.emo-bubble:hover {
  transform: scale(1.08);
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  z-index: 30;
}
.emo-bubble:active { transform: scale(0.94); }

/* PALETTE PASTELLO basata sull'illustrazione "Color = emotion" del midterm */
.c-yellow { background: radial-gradient(circle at 32% 30%, #fff8d6, #ffe9a3 65%, #f6d878); }
.c-orange { background: radial-gradient(circle at 32% 30%, #ffe6cc, #ffc89e 65%, #f4a878); }
.c-pink   { background: radial-gradient(circle at 32% 30%, #ffe0e6, #ffc0cf 65%, #f4a8b8); }
.c-blue   { background: radial-gradient(circle at 32% 30%, #e0f0f8, #b8dcec 65%, #95c4dc); }
.c-green  { background: radial-gradient(circle at 32% 30%, #e0f0d8, #c0e0b0 65%, #98c890); }
.c-white  { background: radial-gradient(circle at 32% 30%, #ffffff, #f8f5ee 65%, #ebe5d8); border: 1px solid rgba(180,170,150,0.25); }
.c-red    { background: radial-gradient(circle at 32% 30%, #ffd8d4, #f8a8a4 65%, #e88884); }

.ambivalence-tag {
  position: absolute;
  top: calc(100% + 4px);
  left: 50%;
  transform: translateX(-50%);
  font-size: 8px;
  color: #a09886;
  font-style: italic;
  letter-spacing: 0.4px;
  white-space: nowrap;
  opacity: 0.7;
}

.tap-hint {
  position: absolute;
  bottom: 50px; left: 0; right: 0;
  text-align: center;
  z-index: 10;
}
.tap-hint-text {
  font-size: 11px;
  color: #8a8474;
  font-style: italic;
  letter-spacing: 0.3px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.5);
  padding: 6px 14px;
  border-radius: 16px;
  backdrop-filter: blur(6px);
}
.tap-hint-text i { animation: tapPulse 2s ease-in-out infinite; }
@keyframes tapPulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

.home-indicator {
  position: absolute;
  bottom: 6px; left: 50%;
  transform: translateX(-50%);
  width: 130px; height: 4px;
  background: #1a1a1a;
  border-radius: 2px;
  z-index: 70;
  opacity: 0.4;
}
</style>
</head>
<body>
<div class="scene">
  <div class="notch"></div>
  <div class="status-bar">
    <span>9:41</span>
    <span><i class="ti ti-wifi"></i> &nbsp;<i class="ti ti-battery-filled"></i></span>
  </div>

  <div class="back-btn"><i class="ti ti-chevron-left"></i></div>

  <div class="step-indicator">
    <div class="step-dots">
      <div class="step-dot active"></div>
      <div class="step-dot active"></div>
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
    </div>
    <span>3 di 4</span>
  </div>

  <div class="ai-prompt">
    <div class="ai-label">
      <i class="ti ti-sparkles" style="font-size: 11px;"></i>
      <span>Echo</span>
    </div>
    <div class="ai-text">"Che emozione<br>hai sentito?"</div>
    <div class="ai-subtext">Tocca la bolla che senti più tua</div>
  </div>

  <div class="constellation">

    <!-- GIALLO: gioia, ottimismo, energia -->
    <div class="emo-bubble c-yellow" style="width: 102px; height: 102px; top: 5px; left: 38px; animation: drift1 6s ease-in-out infinite;">
      <span class="emo-cluster">
        <span class="main">Gioia</span>
        <span class="secondary">ottimismo<br>energia</span>
      </span>
    </div>

    <!-- ARANCIONE: calore, entusiasmo, amicizia -->
    <div class="emo-bubble c-orange" style="width: 96px; height: 96px; top: 0px; left: 230px; animation: drift2 7s ease-in-out infinite;">
      <span class="emo-cluster">
        <span class="main">Calore</span>
        <span class="secondary">entusiasmo<br>amicizia</span>
      </span>
    </div>

    <!-- ROSSO: passione, desiderio - più piccolo, defilato -->
    <div class="emo-bubble c-red" style="width: 76px; height: 76px; top: 130px; left: 152px; animation: drift3 6.5s ease-in-out infinite;">
      <span class="emo-cluster">
        <span class="main">Passione</span>
        <span class="secondary">desiderio</span>
      </span>
    </div>

    <!-- ROSA: amore, compassione -->
    <div class="emo-bubble c-pink" style="width: 100px; height: 100px; top: 115px; left: 25px; animation: drift4 7.5s ease-in-out infinite;">
      <span class="emo-cluster">
        <span class="main">Amore</span>
        <span class="secondary">compassione</span>
      </span>
    </div>

    <!-- AZZURRO: calma, serenità, fiducia -->
    <div class="emo-bubble c-blue" style="width: 96px; height: 96px; top: 130px; left: 250px; animation: drift5 8s ease-in-out infinite;">
      <span class="emo-cluster">
        <span class="main">Calma</span>
        <span class="secondary">serenità<br>fiducia</span>
      </span>
    </div>

    <!-- VERDE: rilassamento, equilibrio, armonia, speranza -->
    <div class="emo-bubble c-green" style="width: 96px; height: 96px; top: 250px; left: 145px; animation: drift6 7s ease-in-out infinite;">
      <span class="emo-cluster">
        <span class="main">Equilibrio</span>
        <span class="secondary">armonia<br>speranza</span>
      </span>
    </div>

    <!-- BIANCO: purezza, pace, chiarezza, calma -->
    <div class="emo-bubble c-white" style="width: 92px; height: 92px; top: 268px; left: 25px; animation: drift7 8.5s ease-in-out infinite;">
      <span class="emo-cluster">
        <span class="main">Purezza</span>
        <span class="secondary">pace<br>chiarezza</span>
      </span>
    </div>

  </div>

  <div class="tap-hint">
    <span class="tap-hint-text">
      <i class="ti ti-hand-finger"></i>
      tocca un'emozione per salvare la bolla
    </span>
  </div>

  <div class="home-indicator"></div>
</div>
</body>
</html>
