<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Echo — Dettaglio bolla</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f5f4ef;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 2rem;
}
.font-serif { font-family: Georgia, 'Times New Roman', serif; }

.scene {
  position: relative;
  width: 380px;
  height: 760px;
  border-radius: 50px;
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,0.12), 0 0 0 12px #1a1a1a, 0 0 0 14px #2a2a2a;
}
.scene-inner {
  width: 100%;
  height: 100%;
  background: linear-gradient(165deg, #FBEAF0 0%, #FAEEDA 35%, #E6F1FB 75%, #EAF3DE 100%);
  border-radius: 50px;
  overflow: hidden;
  position: relative;
}

@keyframes drift1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(8px,-12px); } }
@keyframes drift2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-10px,-8px); } }
@keyframes drift3 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(6px,10px); } }
@keyframes drift4 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-7px,9px); } }
@keyframes drift5 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(11px,-7px); } }
@keyframes drift6 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-9px,-6px); } }
@keyframes breathe { 0%,100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.04); } }
@keyframes wave1 { 0%,100% { height: 6px; } 50% { height: 16px; } }
@keyframes wave2 { 0%,100% { height: 10px; } 50% { height: 22px; } }
@keyframes wave3 { 0%,100% { height: 14px; } 50% { height: 28px; } }

.bg-bubble {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
}
.bg-bubble::before {
  content: '';
  position: absolute;
  top: 14%; left: 20%;
  width: 28%; height: 20%;
  background: rgba(255,255,255,0.7);
  border-radius: 50%;
  filter: blur(3px);
}
.bg-bubble::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.4);
}

.main-bubble-solid {
  position: absolute;
  border-radius: 50%;
  animation: breathe 4s ease-in-out infinite;
}
.main-bubble-solid::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.5);
  pointer-events: none;
}

.action-pill {
  background: rgba(255,255,255,0.85);
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: 14px;
  padding: 13px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  backdrop-filter: blur(8px);
  transition: all 0.2s;
}
.action-pill:hover { background: #fff; transform: translateY(-1px); }

.related-bubble {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  flex-shrink: 0;
  position: relative;
  cursor: pointer;
  transition: transform 0.2s;
}
.related-bubble:hover { transform: scale(1.1); }
.related-bubble::before {
  content: '';
  position: absolute;
  top: 14%; left: 20%;
  width: 28%; height: 20%;
  background: rgba(255,255,255,0.7);
  border-radius: 50%;
  filter: blur(2px);
}
.related-bubble::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.5);
}
.wave-mini {
  width: 3px;
  background: rgba(255,255,255,0.85);
  border-radius: 1.5px;
}
</style>
</head>
<body>

<div class="scene">
  <div class="scene-inner">

    <!-- Bolle decorative di sfondo -->
    <div class="bg-bubble" style="width: 70px; height: 70px; top: 200px; left: 26px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.65) 0%, rgba(255,227,176,0.4) 60%, rgba(186,117,23,0.2) 100%); animation: drift1 12s ease-in-out infinite; opacity: 0.7;"></div>
    <div class="bg-bubble" style="width: 50px; height: 50px; top: 160px; left: 90px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.65) 0%, rgba(200,224,248,0.4) 60%, rgba(55,138,221,0.2) 100%); animation: drift2 14s ease-in-out infinite; opacity: 0.65;"></div>
    <div class="bg-bubble" style="width: 44px; height: 44px; top: 330px; left: 38px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.65) 0%, rgba(221,240,187,0.4) 60%, rgba(99,153,34,0.2) 100%); animation: drift3 13s ease-in-out infinite; opacity: 0.7;"></div>
    <div class="bg-bubble" style="width: 60px; height: 60px; top: 205px; left: 295px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.65) 0%, rgba(255,217,196,0.4) 60%, rgba(216,90,48,0.2) 100%); animation: drift4 15s ease-in-out infinite; opacity: 0.7;"></div>
    <div class="bg-bubble" style="width: 38px; height: 38px; top: 275px; left: 320px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.65) 0%, rgba(248,200,218,0.4) 60%, rgba(212,83,126,0.2) 100%); animation: drift5 11s ease-in-out infinite; opacity: 0.65;"></div>
    <div class="bg-bubble" style="width: 30px; height: 30px; top: 165px; left: 260px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.65) 0%, rgba(221,240,187,0.4) 60%, rgba(99,153,34,0.2) 100%); animation: drift6 13s ease-in-out infinite; opacity: 0.6;"></div>
    <div class="bg-bubble" style="width: 24px; height: 24px; top: 345px; left: 295px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.65) 0%, rgba(247,193,193,0.4) 60%, rgba(163,45,45,0.2) 100%); animation: drift1 14s ease-in-out infinite; opacity: 0.65;"></div>
    <div class="bg-bubble" style="width: 18px; height: 18px; top: 245px; left: 110px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.6) 0%, rgba(248,200,218,0.35) 60%, rgba(212,83,126,0.15) 100%); animation: drift2 12s ease-in-out infinite; opacity: 0.55;"></div>
    <div class="bg-bubble" style="width: 26px; height: 26px; top: 370px; left: 115px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.6) 0%, rgba(255,227,176,0.35) 60%, rgba(186,117,23,0.15) 100%); animation: drift3 16s ease-in-out infinite; opacity: 0.55;"></div>
    <div class="bg-bubble" style="width: 16px; height: 16px; top: 310px; left: 235px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.6) 0%, rgba(200,224,248,0.35) 60%, rgba(55,138,221,0.15) 100%); animation: drift4 13s ease-in-out infinite; opacity: 0.55;"></div>
    <div class="bg-bubble" style="width: 14px; height: 14px; top: 180px; left: 180px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.6) 0%, rgba(221,240,187,0.35) 60%, rgba(99,153,34,0.15) 100%); animation: drift5 15s ease-in-out infinite; opacity: 0.55;"></div>
    <div class="bg-bubble" style="width: 22px; height: 22px; top: 370px; left: 200px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.6) 0%, rgba(255,217,196,0.35) 60%, rgba(216,90,48,0.15) 100%); animation: drift6 12s ease-in-out infinite; opacity: 0.55;"></div>

    <!-- Status bar -->
    <div style="position: absolute; top: 0; left: 0; right: 0; height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 18px 32px 0; font-size: 14px; font-weight: 600; color: #2C2C2A; z-index: 50;">
      <span>9:41</span>
      <div style="display: flex; gap: 6px; align-items: center;">
        <i class="ti ti-signal-4g" style="font-size: 14px;"></i>
        <i class="ti ti-wifi" style="font-size: 14px;"></i>
        <i class="ti ti-battery-3" style="font-size: 16px;"></i>
      </div>
    </div>

    <!-- Notch -->
    <div style="position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 110px; height: 28px; background: #1a1a1a; border-radius: 20px; z-index: 51;"></div>

    <!-- Header con back e dots -->
    <div style="position: absolute; top: 60px; left: 24px; right: 24px; z-index: 40; display: flex; justify-content: space-between; align-items: center;">
      <button style="background: rgba(255,255,255,0.7); border: none; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); cursor: pointer;">
        <i class="ti ti-arrow-left" style="font-size: 18px; color: #2C2C2A;"></i>
      </button>
      <button style="background: rgba(255,255,255,0.7); border: none; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); cursor: pointer;">
        <i class="ti ti-dots" style="font-size: 18px; color: #2C2C2A;"></i>
      </button>
    </div>

    <!-- Banner Echo "Trovata" -->
    <div style="position: absolute; top: 110px; left: 24px; right: 24px; z-index: 40;">
      <div style="background: rgba(255,255,255,0.7); border-radius: 12px; padding: 9px 13px; display: flex; align-items: center; gap: 9px; backdrop-filter: blur(8px); border: 1px solid rgba(0,0,0,0.04);">
        <div style="width: 22px; height: 22px; border-radius: 50%; background: linear-gradient(135deg, #ED93B1 0%, #B5D4F4 100%); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
          <i class="ti ti-sparkles" style="font-size: 12px; color: white;"></i>
        </div>
        <p style="font-size: 12px; color: #5F5E5A; line-height: 1.35;">Trovata: «fammi sentire i <strong style="color: #2C2C2A;">primi passi di Leo</strong>»</p>
      </div>
    </div>

    <!-- Bolla principale che respira con player -->
    <div class="main-bubble-solid" style="width: 180px; height: 180px; top: 195px; left: 50%; transform: translateX(-50%); background: radial-gradient(circle at 50% 50%, #F4A8C2 0%, #ED93B1 50%, #D4537E 100%); box-shadow: 0 16px 40px rgba(237,147,177,0.5), 0 0 60px rgba(237,147,177,0.3); z-index: 25;">
      <div style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
        <i class="ti ti-player-play-filled" style="font-size: 38px; color: white; margin-bottom: 8px;"></i>
        <div style="display: flex; align-items: center; gap: 2px; height: 18px; margin-bottom: 6px;">
          <div class="wave-mini" style="height: 6px; animation: wave1 1.2s ease-in-out infinite;"></div>
          <div class="wave-mini" style="height: 10px; animation: wave2 1.0s ease-in-out infinite;"></div>
          <div class="wave-mini" style="height: 14px; animation: wave3 0.9s ease-in-out infinite;"></div>
          <div class="wave-mini" style="height: 10px; animation: wave2 1.1s ease-in-out infinite;"></div>
          <div class="wave-mini" style="height: 6px; animation: wave1 1.3s ease-in-out infinite;"></div>
          <div class="wave-mini" style="height: 14px; animation: wave3 0.85s ease-in-out infinite;"></div>
          <div class="wave-mini" style="height: 10px; animation: wave2 1.0s ease-in-out infinite;"></div>
        </div>
        <span style="font-size: 12px; color: rgba(255,255,255,0.95); font-weight: 500; letter-spacing: 0.5px;">0:08 / 0:23</span>
      </div>
    </div>

    <!-- Metadata: titolo + chip data, luogo, emozione -->
    <div style="position: absolute; top: 410px; left: 0; right: 0; text-align: center; z-index: 30;">
      <p class="font-serif" style="font-size: 22px; font-weight: 500; color: #2C2C2A; font-style: italic;">Primi passi di Leo</p>
      <div style="display: flex; justify-content: center; gap: 12px; margin-top: 10px; flex-wrap: wrap; padding: 0 24px;">
        <span style="font-size: 11px; color: #5F5E5A; display: inline-flex; align-items: center; gap: 4px;">
          <i class="ti ti-calendar" style="font-size: 12px;"></i>
          8 aprile, 14:32
        </span>
        <span style="font-size: 11px; color: #5F5E5A; display: inline-flex; align-items: center; gap: 4px;">
          <i class="ti ti-map-pin" style="font-size: 12px;"></i>
          Parco Sempione
        </span>
        <span style="font-size: 11px; color: #993556; font-weight: 500; display: inline-flex; align-items: center; gap: 5px; background: rgba(248,200,218,0.5); padding: 3px 9px; border-radius: 10px;">
          <span style="width: 6px; height: 6px; border-radius: 50%; background: #ED93B1;"></span>
          Amore
        </span>
      </div>
    </div>

    <!-- Action pills: Condividi + Modifica -->
    <div style="position: absolute; top: 510px; left: 24px; right: 24px; z-index: 30; display: flex; gap: 10px;">
      <button class="action-pill" style="flex: 1; justify-content: center;">
        <i class="ti ti-share" style="font-size: 16px; color: #2C2C2A;"></i>
        <span style="font-size: 13px; color: #2C2C2A; font-weight: 500;">Condividi</span>
      </button>
      <button class="action-pill" style="flex: 1; justify-content: center;">
        <i class="ti ti-pencil" style="font-size: 16px; color: #2C2C2A;"></i>
        <span style="font-size: 13px; color: #2C2C2A; font-weight: 500;">Modifica</span>
      </button>
    </div>

    <!-- Esplora altri ricordi con Leo -->
    <div style="position: absolute; top: 590px; left: 24px; right: 24px; z-index: 30;">
      <p style="font-size: 11px; color: #5F5E5A; font-weight: 500; margin-bottom: 12px; letter-spacing: 0.2px;">Esplora altri ricordi con Leo</p>
      <div style="display: flex; gap: 12px;">
        <div class="related-bubble" style="background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.75) 0%, rgba(248,200,218,0.6) 25%, rgba(237,147,177,0.5) 60%, rgba(212,83,126,0.45) 100%); box-shadow: 0 3px 8px rgba(237,147,177,0.3);"></div>
        <div class="related-bubble" style="background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.75) 0%, rgba(255,227,176,0.6) 25%, rgba(250,199,117,0.5) 60%, rgba(186,117,23,0.4) 100%); box-shadow: 0 3px 8px rgba(250,199,117,0.3);"></div>
        <div class="related-bubble" style="background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.75) 0%, rgba(255,217,196,0.6) 25%, rgba(245,196,179,0.5) 60%, rgba(216,90,48,0.4) 100%); box-shadow: 0 3px 8px rgba(245,196,179,0.3);"></div>
        <div class="related-bubble" style="background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.75) 0%, rgba(248,200,218,0.6) 25%, rgba(237,147,177,0.5) 60%, rgba(212,83,126,0.45) 100%); box-shadow: 0 3px 8px rgba(237,147,177,0.3);"></div>
        <div class="related-bubble" style="background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.75) 0%, rgba(221,240,187,0.6) 25%, rgba(192,221,151,0.5) 60%, rgba(99,153,34,0.4) 100%); box-shadow: 0 3px 8px rgba(192,221,151,0.4);"></div>
        <div class="related-bubble" style="background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.75) 0%, rgba(248,200,218,0.55) 25%, rgba(237,147,177,0.45) 60%, rgba(212,83,126,0.4) 100%); box-shadow: 0 3px 8px rgba(237,147,177,0.25); opacity: 0.85;"></div>
      </div>
    </div>

    <!-- Home indicator -->
    <div style="position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); width: 130px; height: 4px; background: #1a1a1a; border-radius: 2px; z-index: 70; opacity: 0.4;"></div>

  </div>
</div>

</body>
</html>
