<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Echo — Home</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f5f4ef;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 2rem;
}

@keyframes drift1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(8px,-12px); } }
@keyframes drift2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-10px,-8px); } }
@keyframes drift3 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(6px,10px); } }
@keyframes drift4 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-8px,8px); } }
@keyframes drift5 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(12px,-6px); } }
@keyframes drift6 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-6px,-10px); } }

@keyframes planet1 {
  0%,100% { transform: translate(0,0) scale(1); }
  25% { transform: translate(10px,-8px) scale(1.03); }
  50% { transform: translate(-6px,-14px) scale(1.05); }
  75% { transform: translate(-12px,4px) scale(1.02); }
}
@keyframes planet2 {
  0%,100% { transform: translate(0,0) scale(1); }
  25% { transform: translate(-8px,6px) scale(1.04); }
  50% { transform: translate(8px,12px) scale(1.06); }
  75% { transform: translate(14px,-4px) scale(1.03); }
}
@keyframes planet3 {
  0%,100% { transform: translate(0,0) scale(1); }
  25% { transform: translate(-12px,-6px) scale(1.05); }
  50% { transform: translate(-6px,10px) scale(1.03); }
  75% { transform: translate(8px,8px) scale(1.06); }
}

.bubble-bg {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
}
.bubble-bg::before {
  content: '';
  position: absolute;
  top: 14%; left: 20%;
  width: 28%; height: 20%;
  background: rgba(255,255,255,0.7);
  border-radius: 50%;
  filter: blur(3px);
}
.bubble-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.4);
}

.planet {
  position: absolute;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  z-index: 30;
}
.planet::before {
  content: '';
  position: absolute;
  top: 12%; left: 18%;
  width: 30%; height: 22%;
  background: rgba(255,255,255,0.85);
  border-radius: 50%;
  filter: blur(4px);
  pointer-events: none;
}
.planet::after {
  content: '';
  position: absolute;
  top: 8%; left: 14%;
  width: 14%; height: 10%;
  background: white;
  border-radius: 50%;
  pointer-events: none;
}
.planet-rim {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.6);
  pointer-events: none;
}
.planet-content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.icon-btn {
  background: rgba(255,255,255,0.7);
  border: none;
  border-radius: 50%;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
  cursor: pointer;
}
.profile-circle {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ED93B1 0%, #D4537E 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(212, 83, 126, 0.3);
  border: 2px solid white;
}

/* Cornice iPhone come nelle altre schermate */
.scene-wrapper {
  width: 380px;
  height: 760px;
  border-radius: 50px;
  padding: 0;
  position: relative;
  box-shadow: 0 30px 80px rgba(0,0,0,0.12), 0 0 0 12px #1a1a1a, 0 0 0 14px #2a2a2a;
  overflow: hidden;
}
</style>
</head>
<body>

<div class="scene-wrapper">

<div style="width: 100%; height: 100%; background: linear-gradient(165deg, #FBEAF0 0%, #FAEEDA 35%, #E6F1FB 75%, #EAF3DE 100%); border-radius: 50px; overflow: hidden; position: relative;">

<div id="bubble-cloud" style="position: absolute; top: 110px; left: 0; right: 0; bottom: 40px; pointer-events: none; z-index: 5;"></div>

<!-- Status bar -->
<div style="position: absolute; top: 0; left: 0; right: 0; height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 18px 32px 0; font-size: 14px; font-weight: 600; color: #2C2C2A; z-index: 50;">
  <span>9:41</span>
  <div style="display: flex; gap: 6px; align-items: center;">
    <i class="ti ti-signal-4g" style="font-size: 14px;" aria-hidden="true"></i>
    <i class="ti ti-wifi" style="font-size: 14px;" aria-hidden="true"></i>
    <i class="ti ti-battery-3" style="font-size: 16px;" aria-hidden="true"></i>
  </div>
</div>

<!-- Notch -->
<div style="position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 110px; height: 28px; background: #1a1a1a; border-radius: 20px; z-index: 51;"></div>

<!-- Header (settings + greeting + profile) -->
<div style="position: absolute; top: 60px; left: 24px; right: 24px; z-index: 40; display: flex; justify-content: space-between; align-items: center;">
  <button class="icon-btn">
    <i class="ti ti-settings" style="font-size: 18px; color: #5F5E5A;" aria-hidden="true"></i>
  </button>
  <div style="text-align: center; flex: 1;">
    <p style="font-size: 13px; color: #5F5E5A; margin: 0;">Ciao Molly</p>
  </div>
  <div class="profile-circle">
    <span style="font-size: 14px; color: white; font-weight: 600;">M</span>
  </div>
</div>

<!-- Prompt -->
<div style="position: absolute; top: 120px; left: 24px; right: 24px; z-index: 40; text-align: center;">
  <p style="font-family: Georgia, serif; font-size: 24px; font-weight: 500; color: #2C2C2A; line-height: 1.2;">Cosa ti va di fare?</p>
</div>

<!-- Pianeta principale "Crea" (centro) -->
<div class="planet" style="width: 150px; height: 150px; top: 220px; left: 50%; margin-left: -75px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.75) 0%, rgba(255,227,176,0.65) 25%, rgba(250,199,117,0.55) 60%, rgba(186,117,23,0.5) 100%); box-shadow: 0 12px 32px rgba(250,199,117,0.45), inset 0 0 36px rgba(255,255,255,0.4); animation: planet1 12s ease-in-out infinite;">
  <div class="planet-rim"></div>
  <div class="planet-content">
    <i class="ti ti-microphone" style="font-size: 40px; color: white; opacity: 0.95;" aria-hidden="true"></i>
    <span style="font-family: Georgia, serif; font-size: 14px; color: #412402; font-weight: 600; margin-top: 6px; text-shadow: 0 1px 2px rgba(255,255,255,0.5);">Crea</span>
    <span style="font-size: 10px; color: #412402; opacity: 0.85; margin-top: 1px;">un nuovo ricordo</span>
  </div>
</div>

<!-- Pianeta sinistra "Esplora" -->
<div class="planet" style="width: 130px; height: 130px; top: 410px; left: 30px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.75) 0%, rgba(248,200,218,0.65) 25%, rgba(237,147,177,0.55) 60%, rgba(212,83,126,0.5) 100%); box-shadow: 0 10px 28px rgba(237,147,177,0.45), inset 0 0 32px rgba(255,255,255,0.4); animation: planet2 14s ease-in-out infinite 0.5s;">
  <div class="planet-rim"></div>
  <div class="planet-content">
    <i class="ti ti-circles" style="font-size: 34px; color: white; opacity: 0.95;" aria-hidden="true"></i>
    <span style="font-family: Georgia, serif; font-size: 13px; color: #4B1528; font-weight: 600; margin-top: 5px; text-shadow: 0 1px 2px rgba(255,255,255,0.5);">Esplora</span>
    <span style="font-size: 9px; color: #4B1528; opacity: 0.85; margin-top: 1px;">i tuoi ricordi</span>
  </div>
</div>

<!-- Pianeta destra "Condividi" -->
<div class="planet" style="width: 130px; height: 130px; top: 410px; right: 30px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.75) 0%, rgba(200,224,248,0.65) 25%, rgba(181,212,244,0.55) 60%, rgba(55,138,221,0.45) 100%); box-shadow: 0 10px 28px rgba(181,212,244,0.45), inset 0 0 32px rgba(255,255,255,0.4); animation: planet3 13s ease-in-out infinite 1s;">
  <div class="planet-rim"></div>
  <div class="planet-content">
    <i class="ti ti-send" style="font-size: 32px; color: white; opacity: 0.95;" aria-hidden="true"></i>
    <span style="font-family: Georgia, serif; font-size: 13px; color: #042C53; font-weight: 600; margin-top: 5px; text-shadow: 0 1px 2px rgba(255,255,255,0.5);">Condividi</span>
    <span style="font-size: 9px; color: #042C53; opacity: 0.85; margin-top: 1px;">una bolla</span>
  </div>
</div>

<!-- Home indicator -->
<div style="position: absolute; bottom: 0; left: 0; right: 0; height: 40px; background: rgba(255, 255, 255, 0.6); border-top: 0.5px solid rgba(0,0,0,0.04); display: flex; justify-content: center; align-items: flex-start; padding-top: 8px; backdrop-filter: blur(8px); z-index: 40;">
  <div style="width: 130px; height: 4px; border-radius: 2px; background: #2C2C2A; opacity: 0.3;"></div>
</div>

</div>
</div>

<script>
(function() {
  const cloud = document.getElementById('bubble-cloud');
  if (!cloud) return;
  const W = 356, H = 580;

  // Zone occupate dai 3 pianeti, da escludere
  const forbidden = [
    {x1: 95, y1: 110, x2: 261, y2: 285},   // pianeta centrale Crea
    {x1: 6, y1: 300, x2: 142, y2: 440},    // pianeta sinistra Esplora
    {x1: 214, y1: 300, x2: 350, y2: 440},  // pianeta destra Condividi
  ];

  function inForbiddenZone(x, y, size) {
    for (const f of forbidden) {
      if (x + size > f.x1 && x < f.x2 && y + size > f.y1 && y < f.y2) return true;
    }
    return false;
  }

  const palettes = [
    ['rgba(255,227,176,0.4)', 'rgba(186,117,23,0.2)'],
    ['rgba(255,217,196,0.4)', 'rgba(216,90,48,0.2)'],
    ['rgba(248,200,218,0.4)', 'rgba(212,83,126,0.2)'],
    ['rgba(200,224,248,0.4)', 'rgba(55,138,221,0.2)'],
    ['rgba(221,240,187,0.4)', 'rgba(99,153,34,0.2)'],
    ['rgba(255,255,255,0.4)', 'rgba(180,180,180,0.2)'],
  ];

  const placed = [];
  function tryPlace(size) {
    for (let a = 0; a < 80; a++) {
      const x = Math.random() * (W - size);
      const y = Math.random() * (H - size);
      if (inForbiddenZone(x, y, size)) continue;
      let ok = true;
      for (const p of placed) {
        const d = Math.sqrt((x+size/2-p.x-p.s/2)**2 + (y+size/2-p.y-p.s/2)**2);
        if (d < (size + p.s)/2 - 4) { ok = false; break; }
      }
      if (ok) { placed.push({x, y, s: size}); return {x, y}; }
    }
    return null;
  }

  const distribution = [
    { count: 18, min: 8, max: 16, opacity: [0.4, 0.6] },
    { count: 22, min: 16, max: 28, opacity: [0.5, 0.7] },
    { count: 12, min: 28, max: 42, opacity: [0.55, 0.7] },
  ];

  let idx = 0;
  distribution.forEach(tier => {
    for (let i = 0; i < tier.count; i++) {
      const size = tier.min + Math.random() * (tier.max - tier.min);
      const pos = tryPlace(size);
      if (!pos) continue;
      const p = palettes[Math.floor(Math.random() * palettes.length)];
      const op = tier.opacity[0] + Math.random() * (tier.opacity[1] - tier.opacity[0]);
      const drift = `drift${(idx % 6) + 1} ${10 + Math.random() * 10}s ease-in-out infinite alternate`;

      const el = document.createElement('div');
      el.className = 'bubble-bg';
      el.style.cssText = `width:${size}px;height:${size}px;left:${pos.x}px;top:${pos.y}px;background:radial-gradient(circle at 35% 30%, rgba(255,255,255,0.65) 0%, ${p[0]} 60%, ${p[1]} 100%);opacity:${op};animation:${drift};`;
      cloud.appendChild(el);
      idx++;
    }
  });
})();
</script>

</body>
</html>
