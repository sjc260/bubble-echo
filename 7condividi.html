<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Echo — Condividi</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f5f4ef;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 2rem;
}

.scene {
  position: relative;
  width: 380px;
  height: 760px;
  border-radius: 50px;
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,0.12), 0 0 0 12px #1a1a1a, 0 0 0 14px #2a2a2a;
}
.scene-inner {
  width: 100%;
  height: 100%;
  background: linear-gradient(165deg, #FBEAF0 0%, #FAEEDA 35%, #E6F1FB 75%, #EAF3DE 100%);
  border-radius: 50px;
  overflow: hidden;
  position: relative;
}

@keyframes drift1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(8px,-12px); } }
@keyframes drift2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-10px,-8px); } }
@keyframes drift3 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(6px,10px); } }
@keyframes drift4 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-7px,9px); } }
@keyframes drift5 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(11px,-7px); } }
@keyframes drift6 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-9px,-6px); } }
@keyframes drift7 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(6px,11px); } }

@keyframes selectedPulse {
  0%,100% { transform: scale(1.08); }
  50%     { transform: scale(1.12); }
}

@keyframes ringPulse {
  0%,100% { opacity: 0.7; }
  50%     { opacity: 1; }
}

.bg-bubble {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
}
.bg-bubble::before {
  content: '';
  position: absolute;
  top: 14%; left: 20%;
  width: 28%; height: 20%;
  background: rgba(255,255,255,0.7);
  border-radius: 50%;
  filter: blur(3px);
}
.bg-bubble::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.4);
}

.notch {
  position: absolute;
  top: 12px; left: 50%;
  transform: translateX(-50%);
  width: 110px; height: 28px;
  background: #1a1a1a;
  border-radius: 20px;
  z-index: 100;
}
.status-bar {
  position: absolute;
  top: 18px; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  padding: 0 32px;
  font-size: 14px;
  font-weight: 600;
  color: #2C2C2A;
  z-index: 99;
}

/* Bottone back in alto a sinistra */
.back-btn {
  position: absolute;
  top: 60px; left: 24px;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: #555;
  cursor: pointer;
  border: 1px solid rgba(0,0,0,0.04);
  z-index: 50;
}
.back-btn:hover { background: #fff; }

/* Bottone settings in alto a destra */
.settings-btn {
  position: absolute;
  top: 60px; right: 24px;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: #555;
  cursor: pointer;
  border: 1px solid rgba(0,0,0,0.04);
  z-index: 50;
}
.settings-btn:hover { background: #fff; }

/* Prompt Echo */
.ai-prompt {
  position: absolute;
  top: 110px; left: 0; right: 0;
  padding: 0 36px;
  text-align: center;
  z-index: 10;
}
.ai-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: #8a8474;
  margin-bottom: 12px;
  background: rgba(255,255,255,0.55);
  padding: 5px 12px;
  border-radius: 12px;
  backdrop-filter: blur(6px);
}
.ai-text {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 22px;
  font-style: italic;
  color: #1a1a1a;
  line-height: 1.4;
  letter-spacing: -0.3px;
}

/* Costellazione bolle - con titoli */
.constellation {
  position: absolute;
  top: 220px;
  left: 0; right: 0;
  height: 280px;
  z-index: 5;
}

.share-bubble {
  position: absolute;
  border-radius: 50%;
  cursor: pointer;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 8px 6px;
}
.share-bubble::before {
  content: '';
  position: absolute;
  top: 12%; left: 18%;
  width: 32%; height: 24%;
  background: rgba(255,255,255,0.85);
  border-radius: 50%;
  filter: blur(3px);
  pointer-events: none;
}
.share-bubble::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 70% 78%, rgba(0,0,0,0.04), transparent 55%);
  pointer-events: none;
}
.share-bubble .bubble-title {
  position: relative;
  z-index: 2;
  font-family: Georgia, serif;
  font-style: italic;
  font-size: 10px;
  color: #1a1a1a;
  line-height: 1.15;
  text-shadow: 0 1px 2px rgba(255,255,255,0.7);
  letter-spacing: 0.1px;
}

/* Stato non selezionato: leggera trasparenza */
.share-bubble {
  opacity: 0.85;
}
.share-bubble:hover {
  transform: scale(1.06);
  opacity: 1;
}

/* Stato non selezionato: leggera trasparenza per dare contrasto al "selected" */
.share-bubble.dimmed {
  opacity: 0.55;
  filter: blur(0.4px);
}

/* Stato selezionato: la bolla resta intera ma circondata da onde concentriche */
.share-bubble.selected {
  opacity: 1;
  z-index: 30;
  animation: selectedPulse 2.5s ease-in-out infinite;
}

/* Onde concentriche STATICHE intorno alla bolla scelta */
.ring {
  position: absolute;
  top: 50%; left: 50%;
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  border: 2px solid rgba(244,168,184,0.55);
  animation: ringPulse 2.5s ease-in-out infinite;
}
.ring.r2 { border-color: rgba(244,168,184,0.35); animation-delay: 0.3s; }
.ring.r3 { border-color: rgba(244,168,184,0.2);  animation-delay: 0.6s; }

/* Palette colori bolle (palette ufficiale) */
.c-yellow { background: radial-gradient(circle at 32% 30%, #fff8d6, #ffe9a3 65%, #f6d878); }
.c-orange { background: radial-gradient(circle at 32% 30%, #ffe6cc, #ffc89e 65%, #f4a878); }
.c-pink   { background: radial-gradient(circle at 32% 30%, #ffe0e6, #ffc0cf 65%, #f4a8b8); }
.c-blue   { background: radial-gradient(circle at 32% 30%, #e0f0f8, #b8dcec 65%, #95c4dc); }
.c-green  { background: radial-gradient(circle at 32% 30%, #e0f0d8, #c0e0b0 65%, #98c890); }

/* Sezione "Con chi" - destinatari */
.recipients-section {
  position: absolute;
  bottom: 175px; left: 0; right: 0;
  z-index: 10;
  padding: 0 24px;
}
.section-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #8a8474;
  text-align: center;
  margin-bottom: 14px;
}

.recipients {
  display: flex;
  justify-content: space-between;
  gap: 4px;
  align-items: center;
}
.recipient {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  transition: transform 0.2s ease;
  flex: 1;
}
.recipient:hover { transform: translateY(-2px); }

.avatar {
  width: 50px; height: 50px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Georgia, serif;
  font-size: 16px;
  font-weight: 600;
  color: white;
  font-style: italic;
  border: 2px solid rgba(255,255,255,0.7);
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
}
.recipient.selected .avatar {
  transform: scale(1.12);
  box-shadow: 0 6px 18px rgba(244,168,184,0.5), 0 0 0 3px rgba(244,168,184,0.35);
  border-color: rgba(255,255,255,0.95);
}

.av-mamma  { background: linear-gradient(135deg, #f4b9c3, #e89bb0); }
.av-marco  { background: linear-gradient(135deg, #95c4dc, #6ba8c8); }
.av-sara   { background: linear-gradient(135deg, #f6d878, #e8b850); }
.av-papa   { background: linear-gradient(135deg, #98c890, #78b070); }
.av-add    { background: rgba(255,255,255,0.6); border-style: dashed; border-color: rgba(0,0,0,0.15); color: #8a8474; }

.recipient-name {
  font-family: Georgia, serif;
  font-size: 10px;
  color: #555;
  font-style: italic;
  letter-spacing: 0.1px;
}
.recipient.selected .recipient-name {
  color: #1a1a1a;
  font-weight: 600;
}

/* Bottone INVIA */
.send-btn {
  position: absolute;
  bottom: 70px; left: 30px; right: 30px;
  height: 54px;
  border-radius: 27px;
  background: rgba(180,170,150,0.4);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: rgba(60,50,40,0.5);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.7px;
  cursor: not-allowed;
  transition: all 0.3s;
  z-index: 20;
  border: 1px solid rgba(255,255,255,0.4);
}
.send-btn.active {
  background: linear-gradient(135deg, #98c890 0%, #78b070 100%);
  color: white;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(120,176,112,0.4);
  border: 1px solid transparent;
}
.send-btn.active:hover { transform: scale(1.02); box-shadow: 0 12px 28px rgba(120,176,112,0.5); }
.send-btn i { font-size: 17px; }

/* Selection summary chip - subito sopra il bottone INVIA */
.selection-summary {
  position: absolute;
  bottom: 144px; left: 24px; right: 24px;
  text-align: center;
  z-index: 9;
  font-size: 11px;
  color: #8a8474;
  font-style: italic;
  font-family: Georgia, serif;
  opacity: 0;
  transition: opacity 0.4s;
  pointer-events: none;
  display: none;
  line-height: 1.4;
}
.selection-summary.visible {
  opacity: 1;
  display: block;
}
.selection-summary strong { color: #1a1a1a; font-weight: 600; }

.home-indicator {
  position: absolute;
  bottom: 6px; left: 50%;
  transform: translateX(-50%);
  width: 130px; height: 4px;
  background: #1a1a1a;
  border-radius: 2px;
  z-index: 70;
  opacity: 0.4;
}
</style>
</head>
<body>

<div class="scene">
  <div class="scene-inner">

    <!-- Bolle decorative di sfondo per profondità -->
    <div class="bg-bubble" style="width: 38px; height: 38px; top: 80px; left: 18px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.65) 0%, rgba(255,233,163,0.5) 60%, rgba(246,216,120,0.3) 100%); animation: drift1 12s ease-in-out infinite alternate; opacity: 0.55;"></div>
    <div class="bg-bubble" style="width: 28px; height: 28px; top: 165px; left: 320px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.65) 0%, rgba(184,220,236,0.5) 60%, rgba(149,196,220,0.3) 100%); animation: drift2 14s ease-in-out infinite alternate; opacity: 0.5;"></div>
    <div class="bg-bubble" style="width: 22px; height: 22px; top: 250px; left: 12px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.65) 0%, rgba(192,224,176,0.5) 60%, rgba(152,200,144,0.3) 100%); animation: drift3 13s ease-in-out infinite alternate; opacity: 0.5;"></div>
    <div class="bg-bubble" style="width: 18px; height: 18px; top: 80px; left: 322px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.6) 0%, rgba(255,200,158,0.45) 60%, rgba(244,168,120,0.3) 100%); animation: drift4 11s ease-in-out infinite alternate; opacity: 0.5;"></div>
    <div class="bg-bubble" style="width: 16px; height: 16px; top: 290px; left: 343px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.6) 0%, rgba(255,192,207,0.45) 60%, rgba(244,168,184,0.3) 100%); animation: drift5 15s ease-in-out infinite alternate; opacity: 0.45;"></div>
    <div class="bg-bubble" style="width: 30px; height: 30px; top: 360px; left: 200px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.6) 0%, rgba(255,192,207,0.45) 60%, rgba(244,168,184,0.3) 100%); animation: drift6 13s ease-in-out infinite alternate; opacity: 0.45;"></div>
    <div class="bg-bubble" style="width: 24px; height: 24px; top: 410px; left: 28px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.6) 0%, rgba(255,233,163,0.45) 60%, rgba(246,216,120,0.3) 100%); animation: drift7 14s ease-in-out infinite alternate; opacity: 0.5;"></div>
    <div class="bg-bubble" style="width: 14px; height: 14px; top: 220px; left: 165px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.6) 0%, rgba(184,220,236,0.45) 60%, rgba(149,196,220,0.3) 100%); animation: drift1 14s ease-in-out infinite alternate; opacity: 0.4;"></div>
    <div class="bg-bubble" style="width: 12px; height: 12px; top: 380px; left: 95px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.6) 0%, rgba(192,224,176,0.45) 60%, rgba(152,200,144,0.3) 100%); animation: drift2 12s ease-in-out infinite alternate; opacity: 0.45;"></div>
    <div class="bg-bubble" style="width: 20px; height: 20px; top: 440px; left: 320px; background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.6) 0%, rgba(255,200,158,0.45) 60%, rgba(244,168,120,0.3) 100%); animation: drift3 16s ease-in-out infinite alternate; opacity: 0.4;"></div>

    <!-- Status bar -->
    <div class="status-bar">
      <span>9:41</span>
      <span><i class="ti ti-wifi"></i> &nbsp;<i class="ti ti-battery-filled"></i></span>
    </div>

    <!-- Notch -->
    <div class="notch"></div>

    <!-- Back button -->
    <div class="back-btn"><i class="ti ti-chevron-left"></i></div>

    <!-- Settings button -->
    <div class="settings-btn"><i class="ti ti-settings"></i></div>

    <!-- Prompt Echo -->
    <div class="ai-prompt">
      <div class="ai-label">
        <i class="ti ti-sparkles" style="font-size: 11px;"></i>
        <span>Echo</span>
      </div>
      <div class="ai-text">"Quale ricordo<br>vuoi condividere?"</div>
    </div>

    <!-- Costellazione bolle disponibili (5 bolle del mondo Molly+Leo) -->
    <div class="constellation">
      <!-- BOLLA SELEZIONATA con anelli concentrici intorno -->
      <div class="share-bubble c-yellow selected" style="width: 92px; height: 92px; top: 10px; left: 38px;">
        <div class="ring" style="width: 120px; height: 120px;"></div>
        <div class="ring r2" style="width: 150px; height: 150px;"></div>
        <div class="ring r3" style="width: 180px; height: 180px;"></div>
        <span class="bubble-title">"Mamma"<br>la prima volta</span>
      </div>

      <!-- BOLLE NON SELEZIONATE (dimmed) -->
      <div class="share-bubble c-pink dimmed" style="width: 86px; height: 86px; top: 0px; left: 230px;">
        <span class="bubble-title">Il bagnetto<br>di Leo</span>
      </div>
      <div class="share-bubble c-orange dimmed" style="width: 78px; height: 78px; top: 100px; left: 158px;">
        <span class="bubble-title">Caffè prima<br>che si svegli</span>
      </div>
      <div class="share-bubble c-blue dimmed" style="width: 78px; height: 78px; top: 130px; left: 30px;">
        <span class="bubble-title">Leo e<br>il mare</span>
      </div>
      <div class="share-bubble c-pink dimmed" style="width: 80px; height: 80px; top: 145px; left: 250px;">
        <span class="bubble-title">Addormentato<br>in braccio</span>
      </div>
    </div>

    <!-- Selection summary -->
    <div class="selection-summary visible">
      Stai inviando <strong>"Mamma" la prima volta</strong> a <strong>Mamma</strong>
    </div>

    <!-- Sezione destinatari -->
    <div class="recipients-section">
      <div class="section-title">Con chi vuoi condividere</div>
      <div class="recipients">
        <div class="recipient selected">
          <div class="avatar av-mamma">M</div>
          <span class="recipient-name">Mamma</span>
        </div>
        <div class="recipient">
          <div class="avatar av-marco">M</div>
          <span class="recipient-name">Marco</span>
        </div>
        <div class="recipient">
          <div class="avatar av-sara">S</div>
          <span class="recipient-name">Sara</span>
        </div>
        <div class="recipient">
          <div class="avatar av-papa">P</div>
          <span class="recipient-name">Papà</span>
        </div>
        <div class="recipient">
          <div class="avatar av-add"><i class="ti ti-plus" style="font-size: 18px;"></i></div>
          <span class="recipient-name">Altro</span>
        </div>
      </div>
    </div>

    <!-- Bottone INVIA (attivo perché entrambi sono selezionati) -->
    <div class="send-btn active">
      <i class="ti ti-send"></i>
      <span>INVIA LA BOLLA</span>
    </div>

    <!-- Home indicator -->
    <div class="home-indicator"></div>

  </div>
</div>

</body>
</html>
